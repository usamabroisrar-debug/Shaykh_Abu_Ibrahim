<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Fiqh Essentials Cover</title>
  <desc id="desc">Decorative cover for the Fiqh Essentials course.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="52%" stop-color="#065f46"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <circle cx="950" cy="150" r="170" fill="#ffffff" fill-opacity=".08"/>
  <text x="84" y="118" fill="#fde68a" font-family="Arial, sans-serif" font-size="28" font-weight="700">PRACTICAL RULINGS</text>
  <text x="84" y="270" fill="#ffffff" font-family="Georgia, serif" font-size="88" font-weight="700">Fiqh Essentials</text>
  <text x="84" y="352" fill="#ecfdf5" font-family="Arial, sans-serif" font-size="34">Worship, purification and daily Islamic rulings taught with clarity.</text>
  <rect x="84" y="438" width="520" height="170" rx="28" fill="#ffffff" fill-opacity=".11"/>
  <text x="122" y="505" fill="#ffffff" font-family="Arial, sans-serif" font-size="28">Taharah and salah</text>
  <text x="122" y="553" fill="#ffffff" font-family="Arial, sans-serif" font-size="28">Fasting and zakat</text>
  <text x="122" y="601" fill="#ffffff" font-family="Arial, sans-serif" font-size="28">Daily life rulings</text>
