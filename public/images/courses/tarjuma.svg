<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Quran Translation Cover</title>
  <desc id="desc">Decorative cover for the Quran Translation course.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b3b36"/>
      <stop offset="52%" stop-color="#15803d"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect x="788" y="124" width="250" height="330" rx="28" fill="#ffffff" fill-opacity=".08"/>
  <text x="84" y="118" fill="#fde68a" font-family="Arial, sans-serif" font-size="28" font-weight="700">MEANING AND REFLECTION</text>
  <text x="84" y="270" fill="#ffffff" font-family="Georgia, serif" font-size="84" font-weight="700">Quran Translation</text>
  <text x="84" y="352" fill="#ecfdf5" font-family="Arial, sans-serif" font-size="34">Understand verses through vocabulary, themes and guided explanation.</text>
  <rect x="84" y="438" width="520" height="170" rx="28" fill="#ffffff" fill-opacity=".11"/>
  <text x="122" y="505" fill="#ffffff" font-family="Arial, sans-serif" font-size="28">Quranic vocabulary</text>
  <text x="122" y="553" fill="#ffffff" font-family="Arial, sans-serif" font-size="28">Sentence meanings</text>
  <text x="122" y="601" fill="#ffffff" font-family="Arial, sans-serif" font-size="28">Practical spiritual lessons</text>
</svg>
