<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Tafseer Cover</title>
  <desc id="desc">Decorative cover for the Tafseer course.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="48%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <circle cx="920" cy="200" r="190" fill="#ffffff" fill-opacity=".08"/>
  <text x="84" y="118" fill="#fde68a" font-family="Arial, sans-serif" font-size="28" font-weight="700">ADVANCED UNDERSTANDING</text>
  <text x="84" y="270" fill="#ffffff" font-family="Georgia, serif" font-size="88" font-weight="700">Tafseer Course</text>
  <text x="84" y="352" fill="#ecfdf5" font-family="Arial, sans-serif" font-size="34">Study revelation context, major themes and applied Quranic guidance.</text>
  <rect x="84" y="438" width="510" height="170" rx="28" fill="#ffffff" fill-opacity=".11"/>
  <text x="122" y="505" fill="#ffffff" font-family="Arial, sans-serif" font-size="28">Context of revelation</text>
  <text x="122" y="553" fill="#ffffff" font-family="Arial, sans-serif" font-size="28">Surah themes</text>
  <text x="122" y="601" fill="#ffffff" font-family="Arial, sans-serif" font-size="28">Reflection and application</text>
</svg>
