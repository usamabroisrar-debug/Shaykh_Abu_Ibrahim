<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Hifz Course Cover</title>
  <desc id="desc">Decorative cover for the Hifz ul Quran course.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="52%" stop-color="#14532d"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <circle cx="930" cy="210" r="210" fill="#ffffff" fill-opacity=".07"/>
  <text x="84" y="118" fill="#fde68a" font-family="Arial, sans-serif" font-size="28" font-weight="700">MEMORIZATION TRACK</text>
  <text x="84" y="272" fill="#ffffff" font-family="Georgia, serif" font-size="88" font-weight="700">Hifz ul Quran</text>
  <text x="84" y="354" fill="#ecfdf5" font-family="Arial, sans-serif" font-size="34">Structured sabaq, sabqi and manzil revision with teacher supervision.</text>
  <rect x="84" y="434" width="480" height="182" rx="28" fill="#ffffff" fill-opacity=".1"/>
  <text x="122" y="500" fill="#ffffff" font-family="Arial, sans-serif" font-size="28">Daily sabaq targets</text>
  <text x="122" y="548" fill="#ffffff" font-family="Arial, sans-serif" font-size="28">Revision systems</text>
  <text x="122" y="596" fill="#ffffff" font-family="Arial, sans-serif" font-size="28">Weekly evaluation</text>
</svg>
