<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Qaida Course Cover</title>
  <desc id="desc">Decorative cover for the Qaida course.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#052e2b"/>
      <stop offset="55%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <circle cx="980" cy="120" r="180" fill="#ffffff" fill-opacity=".08"/>
  <circle cx="180" cy="700" r="220" fill="#ffffff" fill-opacity=".06"/>
  <rect x="84" y="94" width="264" height="44" rx="22" fill="#facc15" fill-opacity=".24"/>
  <text x="116" y="124" fill="#fef3c7" font-family="Georgia, serif" font-size="28" font-weight="700">BEGINNER PATHWAY</text>
  <text x="84" y="272" fill="#ffffff" font-family="Georgia, serif" font-size="92" font-weight="700">Qaida</text>
  <text x="84" y="356" fill="#ecfdf5" font-family="Arial, sans-serif" font-size="34">Noorani foundation with makharij, harakat and fluent basics.</text>
  <rect x="84" y="438" width="450" height="180" rx="28" fill="#ffffff" fill-opacity=".11" stroke="#ffffff" stroke-opacity=".16"/>
  <text x="122" y="500" fill="#fef3c7" font-family="Arial, sans-serif" font-size="26" font-weight="700">Skills Covered</text>
  <text x="122" y="548" fill="#ffffff" font-family="Arial, sans-serif" font-size="28">Arabic letters</text>
  <text x="122" y="590" fill="#ffffff" font-family="Arial, sans-serif" font-size="28">Joining rules</text>
  <text x="122" y="632" fill="#ffffff" font-family="Arial, sans-serif" font-size="28">Early pronunciation</text>
</svg>
