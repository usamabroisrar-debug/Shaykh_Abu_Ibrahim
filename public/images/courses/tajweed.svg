<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Tajweed Course Cover</title>
  <desc id="desc">Decorative cover for the Tajweed course.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#134e4a"/>
      <stop offset="50%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <path d="M900 130c90 0 160 68 160 152s-70 152-160 152-160-68-160-152 70-152 160-152Z" fill="#ffffff" fill-opacity=".08"/>
  <text x="84" y="118" fill="#fde68a" font-family="Arial, sans-serif" font-size="28" font-weight="700">RECITATION EXCELLENCE</text>
  <text x="84" y="270" fill="#ffffff" font-family="Georgia, serif" font-size="88" font-weight="700">Tajweed Master</text>
  <text x="84" y="352" fill="#ecfdf5" font-family="Arial, sans-serif" font-size="34">Makharij, sifaat, ghunnah and waqf rules taught with practical correction.</text>
  <rect x="84" y="438" width="520" height="170" rx="28" fill="#ffffff" fill-opacity=".11"/>
  <text x="122" y="505" fill="#ffffff" font-family="Arial, sans-serif" font-size="28">Makharij and sifaat</text>
  <text x="122" y="553" fill="#ffffff" font-family="Arial, sans-serif" font-size="28">Madd and qalqalah</text>
  <text x="122" y="601" fill="#ffffff" font-family="Arial, sans-serif" font-size="28">Beautiful recitation habits</text>
</svg>
