<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Nazra Quran Cover</title>
  <desc id="desc">Decorative cover for the Nazra Quran course.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#022c22"/>
      <stop offset="50%" stop-color="#166534"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect x="770" y="110" width="280" height="280" rx="38" fill="#ffffff" fill-opacity=".1"/>
  <rect x="820" y="160" width="180" height="180" rx="22" fill="#ffffff" fill-opacity=".18"/>
  <text x="88" y="118" fill="#fde68a" font-family="Arial, sans-serif" font-size="28" font-weight="700">QURAN READING</text>
  <text x="84" y="270" fill="#ffffff" font-family="Georgia, serif" font-size="88" font-weight="700">Nazra Quran</text>
  <text x="84" y="350" fill="#ecfdf5" font-family="Arial, sans-serif" font-size="34">Build fluency, confidence and daily correction with live recitation guidance.</text>
  <rect x="84" y="438" width="520" height="170" rx="28" fill="#ffffff" fill-opacity=".11"/>
  <text x="122" y="505" fill="#ffffff" font-family="Arial, sans-serif" font-size="28">Daily reading practice</text>
  <text x="122" y="553" fill="#ffffff" font-family="Arial, sans-serif" font-size="28">Mistake correction</text>
  <text x="122" y="601" fill="#ffffff" font-family="Arial, sans-serif" font-size="28">Confidence in recitation</text>
</svg>
